<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>出行枢纽交互（UI修复版）</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    background:#f8fafc;
}

#wrap{
    display:flex;
    height:100vh;
}

#map{ flex:2; }

#panel{
    flex:1;
    background:white;
    border-left:1px solid #e5e7eb;
    padding:24px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

/* UI控制 */
.hidden{ display:none !important; }

/* marker */
.marker-dot{
    width:16px;
    height:16px;
    background:#f97316;
    border:2px solid white;
    border-radius:50%;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div id="wrap">

    <!-- 地图 -->
    <div id="map"></div>

    <!-- 右侧面板（恢复你的UI结构） -->
    <div id="panel">

        <!-- 标题 -->
        <h4 id="travel-point-title"
            class="font-bold text-gray-800 mb-6 pb-2 border-b border-gray-100 flex items-center">

            <span class="text-gray-400">请点击常州北站</span>
        </h4>

        <!-- 空状态 -->
        <div id="travel-empty"
             class="flex flex-col items-center justify-center text-gray-400 py-12">

            <div class="bg-gray-50 p-4 rounded-full mb-3">
                🚉
            </div>

            <p class="text-sm text-center font-semibold">
                点击左侧地图中的<br>
                <span class="text-orange-500 font-bold">常州北站</span>
            </p>
        </div>

        <!-- 数据面板（恢复卡片样式） -->
        <div id="travel-data" class="hidden space-y-4">

            <div class="flex justify-between items-center bg-orange-50 p-3 rounded border border-orange-100">
                <span class="text-gray-600 text-sm">实时人流</span>
                <span id="travel-flow"
                      class="font-extrabold text-orange-600 font-mono text-xl">--</span>
            </div>

            <div class="flex justify-between items-center bg-blue-50 p-3 rounded border border-blue-100">
                <span class="text-gray-600 text-sm">人流活力指数</span>
                <span id="travel-vitality"
                      class="font-extrabold text-blue-600 font-mono text-xl">--</span>
            </div>

            <div class="flex justify-between items-center bg-purple-50 p-3 rounded border border-purple-100">
                <span class="text-gray-600 text-sm">车流指数</span>
                <span id="travel-traffic"
                      class="font-extrabold text-purple-600 font-mono text-xl">--</span>
            </div>

        </div>

    </div>

</div>

<script>

let map;
let station;
let lines = [];

function initMap(){

    setTimeout(()=>{

        map = L.map('map',{
            zoomControl:false,
            attributionControl:false
        }).setView([31.831,119.974],13);

        L.tileLayer(
            'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
        ).addTo(map);

        // 红点
        station = L.marker([31.831,119.974], {
            icon: L.divIcon({
                className:'',
                html:`<div class="marker-dot"></div>`,
                iconSize:[16,16],
                iconAnchor:[8,8]
            })
        }).addTo(map);

        // ⭐稳定点击（不依赖 marker click）
        map.on('click', function(e){

            const dist = map.distance(
                e.latlng,
                station.getLatLng()
            );

            if(dist < 80){
                activate();
            }
        });

        setTimeout(()=>map.invalidateSize(),300);

    },200);
}

function activate(){

    // 清线（如果后续扩展）
    lines.forEach(l=>map.removeLayer(l));
    lines = [];

    // ===== UI恢复（关键修复点） =====

    document.getElementById('travel-empty')
        .classList.add('hidden');

    document.getElementById('travel-data')
        .classList.remove('hidden');

    document.getElementById('travel-point-title').innerHTML =
        `<span class="text-orange-600 font-bold">常州北站（已激活）</span>`;

    document.getElementById('travel-flow').innerText = '12,450 人/小时';
    document.getElementById('travel-vitality').innerText = '92.4';
    document.getElementById('travel-traffic').innerText = '82.1';
}

window.onload = initMap;

</script>

</body>
</html>
