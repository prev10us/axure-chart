<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>路口实时监控</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

html,
body{
    margin:0;
    padding:0;
    overflow:hidden;
}

.view-hidden{
    display:none !important;
}

.view-block{
    display:block !important;
}

.view-flex{
    display:flex !important;
}

::-webkit-scrollbar{
    width:6px;
}

::-webkit-scrollbar-thumb{
    background:#cbd5e1;
    border-radius:10px;
}

.leaflet-interactive{
    cursor:pointer !important;
}

@keyframes pulse {
    0%{
        transform:scale(1);
        opacity:1;
    }
    50%{
        transform:scale(1.3);
        opacity:0.8;
    }
    100%{
        transform:scale(1);
        opacity:1;
    }
}

.animate-pulse-fast{
    animation:pulse 1.5s infinite ease-in-out;
}

</style>

</head>

<body class="bg-gray-50">

<div class="border border-gray-200 rounded-lg overflow-hidden bg-white shadow-sm">

    <div class="bg-gray-50 px-5 py-3 border-b border-gray-200 font-bold text-gray-800 flex items-center justify-between">

        <span class="flex items-center">
            <i data-lucide="map"
               class="w-5 h-5 mr-2 text-blue-600"></i>
            数据能力交互预览：路口实时监控
        </span>

        <span class="text-xs text-gray-400 font-normal">
            点击红圈选择路口，查看右侧核心指标
        </span>

    </div>

    <div class="flex flex-col md:flex-row h-[420px]">

        <!-- 地图 -->

        <div id="preview-map-intersection"
             class="w-full md:w-2/3 h-full z-0 relative">
        </div>

        <!-- 右侧指标 -->

        <div class="w-full md:w-1/3 bg-white p-6 border-t md:border-t-0 md:border-l border-gray-200 flex flex-col z-10">

            <h4 class="font-bold text-gray-800 mb-4 pb-2 border-b border-gray-100 flex items-center"
                id="intersection-name">

                <i data-lucide="map-pin"
                   class="w-4 h-4 mr-1 text-gray-400">
                </i>

                请选择交叉口

            </h4>

            <div id="intersection-data"
                 class="view-hidden space-y-4 flex-1">

                <div class="flex justify-between items-center bg-orange-50/50 p-3 rounded border border-orange-100">
                    <span class="text-gray-600 text-sm">
                        延误指数
                    </span>

                    <span class="font-bold text-orange-600 font-mono text-xl"
                          id="data-delay">
                        --
                    </span>
                </div>

                <div class="flex justify-between items-center bg-blue-50/50 p-3 rounded border border-blue-100">
                    <span class="text-gray-600 text-sm">
                        平均排队长度
                    </span>

                    <span class="font-bold text-blue-600 font-mono text-xl"
                          id="data-queue">
                        --
                    </span>
                </div>

                <div class="flex justify-between items-center bg-green-50/50 p-3 rounded border border-green-100">
                    <span class="text-gray-600 text-sm">
                        平均速度
                    </span>

                    <span class="font-bold text-green-600 font-mono text-xl"
                          id="data-speed">
                        --
                    </span>
                </div>

                <div class="flex justify-between items-center bg-purple-50/50 p-3 rounded border border-purple-100">
                    <span class="text-gray-600 text-sm">
                        平均停车速度
                    </span>

                    <span class="font-bold text-purple-600 font-mono text-xl"
                          id="data-stop-speed">
                        --
                    </span>
                </div>

            </div>

            <div id="intersection-empty"
                 class="view-flex flex-1 flex-col items-center justify-center text-gray-400">

                <div class="bg-gray-50 p-4 rounded-full mb-3">

                    <i data-lucide="mouse-pointer-click"
                       class="w-8 h-8 opacity-60 text-blue-500">
                    </i>

                </div>

                <p class="text-sm text-center">
                    点击左侧地图的
                    <span class="text-red-500 font-bold">
                        路口标志
                    </span>
                    <br>
                    获取该节点高精监测指标
                </p>

            </div>

        </div>

    </div>

</div>

<script>

lucide.createIcons();

const map = L.map(
    'preview-map-intersection',
    {
        zoomControl:false,
        attributionControl:false
    }
).setView(
    [31.815,119.974],
    13
);

L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
).addTo(map);

const intersections = [

{
    lat:31.831,
    lng:119.974,
    name:'通江南路与辽河路口',
    delay:'1.45',
    queue:'45m',
    speed:'38.5 km/h',
    stopSpeed:'8.2 km/h'
},

{
    lat:31.812,
    lng:119.985,
    name:'通江南路与黄河路交叉口',
    delay:'2.84',
    queue:'190m',
    speed:'21.0 km/h',
    stopSpeed:'3.1 km/h'
},

{
    lat:31.801,
    lng:119.960,
    name:'汉江路与龙江路交叉口',
    delay:'4.12',
    queue:'320m',
    speed:'11.5 km/h',
    stopSpeed:'1.4 km/h'
}

];

const markerIcon = L.divIcon({

    className:'custom-marker',

    html:
    "<div class='animate-pulse-fast' style='background:#ef4444;width:16px;height:16px;border-radius:50%;border:3px solid white;box-shadow:0 0 8px rgba(239,68,68,0.6);'></div>",

    iconSize:[16,16],

    iconAnchor:[8,8]

});

intersections.forEach(item=>{

    const marker = L.marker(
        [item.lat,item.lng],
        {
            icon:markerIcon
        }
    ).addTo(map);

    marker.on('click',()=>{

        document.getElementById(
            'intersection-name'
        ).innerHTML =
        `<i data-lucide="map-pin"
            class="w-4 h-4 mr-1 text-blue-600"></i>
            ${item.name}`;

        document.getElementById(
            'data-delay'
        ).innerText=item.delay;

        document.getElementById(
            'data-queue'
        ).innerText=item.queue;

        document.getElementById(
            'data-speed'
        ).innerText=item.speed;

        document.getElementById(
            'data-stop-speed'
        ).innerText=item.stopSpeed;

        document.getElementById(
            'intersection-empty'
        ).classList.replace(
            'view-flex',
            'view-hidden'
        );

        document.getElementById(
            'intersection-data'
        ).classList.replace(
            'view-hidden',
            'view-block'
        );

        lucide.createIcons();

    });

});

</script>

</body>
</html>
