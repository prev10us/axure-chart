<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公路运行数据预览</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:sans-serif;
    background:#f8fafc;
}

#preview-map-highway{
    width:100%;
    height:100%;
}

@keyframes pulse{
    0%{
        transform:scale(1);
        opacity:1;
    }
    50%{
        transform:scale(1.3);
        opacity:0.8;
    }
    100%{
        transform:scale(1);
        opacity:1;
    }
}

.animate-pulse-fast{
    animation:pulse 1.5s infinite ease-in-out;
}

</style>
</head>

<body>

<div class="h-screen bg-gray-50 p-4">

    <div class="border border-gray-200 rounded-lg overflow-hidden bg-white shadow-sm h-full">

        <div class="bg-gray-50 px-5 py-3 border-b border-gray-200 font-bold text-gray-800 flex items-center justify-between">

            <span class="flex items-center">
                <i data-lucide="navigation"
                   class="w-5 h-5 mr-2 text-indigo-600"></i>
                数据能力交互预览：公路实时事件监测
            </span>

            <span class="text-xs text-gray-400">
                点击事件查看监测指标
            </span>

        </div>

        <div class="flex h-[calc(100%-57px)]">

            <!-- 左侧地图 -->

            <div id="preview-map-highway"
                 class="w-2/3">
            </div>

            <!-- 右侧指标 -->

            <div class="w-1/3 bg-white p-6 border-l border-gray-200 flex flex-col">

                <h4 id="highway-selected-name"
                    class="font-bold text-gray-800 mb-4 pb-2 border-b border-gray-100 flex items-center">

                    <i data-lucide="alert-triangle"
                       class="w-4 h-4 mr-1 text-gray-400"></i>

                    请选择公路事件

                </h4>

                <p id="highway-selected-desc"
                   class="text-sm text-gray-500 mb-5">
                    点击左侧地图事件点查看详情
                </p>

                <div class="space-y-4">

                    <div class="bg-red-50 p-3 rounded border border-red-100 flex justify-between">

                        <span class="text-gray-600 text-sm">
                            事件等级
                        </span>

                        <span id="highway-detail-level"
                              class="font-bold text-red-600">
                            --
                        </span>

                    </div>

                    <div class="bg-blue-50 p-3 rounded border border-blue-100">

                        <div class="flex justify-between mb-2">

                            <span class="text-gray-600 text-sm">
                                处置状态
                            </span>

                            <span id="highway-detail-status"
                                  class="font-bold text-blue-600">
                                --
                            </span>

                        </div>

                        <div class="w-full h-2 bg-gray-200 rounded overflow-hidden">

                            <div id="highway-detail-progress"
                                 class="bg-blue-500 h-full transition-all duration-500"
                                 style="width:0%">
                            </div>

                        </div>

                    </div>

                    <div class="bg-orange-50 p-3 rounded border border-orange-100 flex justify-between">

                        <span class="text-gray-600 text-sm">
                            影响里程
                        </span>

                        <span id="highway-detail-mileage"
                              class="font-bold text-orange-600 text-xl">
                            --
                        </span>

                    </div>

                    <div class="bg-purple-50 p-3 rounded border border-purple-100 flex justify-between">

                        <span class="text-gray-600 text-sm">
                            持续时间
                        </span>

                        <span id="highway-detail-duration"
                              class="font-bold text-purple-600 text-xl">
                            --
                        </span>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

lucide.createIcons();

const mapHighway = L.map(
    'preview-map-highway',
    {
        zoomControl:false,
        attributionControl:false
    }
).setView([31.815,119.974],12);

L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'
).addTo(mapHighway);

L.polyline(
    [
        [31.850,119.940],
        [31.812,120.020]
    ],
    {
        color:'#64748b',
        weight:5
    }
).addTo(mapHighway);

L.polyline(
    [
        [31.800,119.930],
        [31.830,120.010]
    ],
    {
        color:'#64748b',
        weight:5
    }
).addTo(mapHighway);

const events = [

{
    road:'G2京沪高速高架段',
    detail:'三车追尾，占用两条车道',
    level:'严重',
    status:'现场处置中',
    progress:'45%',
    mileage:'3.5 km',
    duration:'45分钟',
    lat:31.831,
    lng:119.965,
    color:'#ef4444'
},

{
    road:'G15沈海高速K123段',
    detail:'道路养护施工',
    level:'轻微',
    status:'准备收尾',
    progress:'90%',
    mileage:'1.2 km',
    duration:'2小时',
    lat:31.812,
    lng:119.985,
    color:'#3b82f6'
},

{
    road:'G50沪渝高速段',
    detail:'团雾天气限速',
    level:'中度',
    status:'限速管控',
    progress:'75%',
    mileage:'12 km',
    duration:'3.5小时',
    lat:31.801,
    lng:119.960,
    color:'#f97316'
}

];

events.forEach(item=>{

    const icon = L.divIcon({

        className:'',

        html:`
        <div class="animate-pulse-fast"
             style="
                width:18px;
                height:18px;
                background:${item.color};
                border-radius:50%;
                border:3px solid white;
                box-shadow:0 0 12px ${item.color};
             ">
        </div>
        `,

        iconSize:[18,18],
        iconAnchor:[9,9]

    });

    const marker = L.marker(
        [item.lat,item.lng],
        {icon}
    ).addTo(mapHighway);

    marker.on('click',()=>{

        document.getElementById(
            'highway-selected-name'
        ).innerHTML =
        `<i data-lucide="alert-triangle"
            class="w-4 h-4 mr-1 text-red-500">
         </i>${item.road}`;

        document.getElementById(
            'highway-selected-desc'
        ).innerText =
        item.detail;

        document.getElementById(
            'highway-detail-level'
        ).innerText =
        item.level;

        document.getElementById(
            'highway-detail-status'
        ).innerText =
        item.status;

        document.getElementById(
            'highway-detail-progress'
        ).style.width =
        item.progress;

        document.getElementById(
            'highway-detail-mileage'
        ).innerText =
        item.mileage;

        document.getElementById(
            'highway-detail-duration'
        ).innerText =
        item.duration;

        lucide.createIcons();

    });

});

</script>

</body>
</html>
