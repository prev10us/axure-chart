<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行业分布</title>

    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>

    <style>
        html,body{
            margin:0;
            padding:0;
            width:100%;
            height:100%;
            overflow:hidden;
            background:transparent;
        }

        #chart-container{
            width:100%;
            height:100%;
        }
    </style>
</head>
<body>

<div id="chart-container"></div>

<script>

document.addEventListener('DOMContentLoaded',function(){

    const chart=echarts.init(document.getElementById('chart-container'));

    const industryNames=[
        '政府机构',
        '科研院所',
        '企业服务',
        '其他'
    ];

    const industryData=[
        198,
        128,
        115,
        82
    ];

    chart.setOption({

        title:{
            text:'行业分布',
            left:'2%',
            top:'2%',
            textStyle:{
                color:'#000',
                fontSize:16,
                fontWeight:'bold'
            }
        },

        tooltip:{
            trigger:'axis',
            axisPointer:{
                type:'shadow'
            }
        },

        grid:{
            left:'2%',
            right:'4%',
            top:'25%',
            bottom:'12%',
            containLabel:true
        },

        xAxis:{
            type:'category',
            data:industryNames,
            axisLabel:{
                color:'#000',
                interval:0
            },
            axisLine:{
                lineStyle:{
                    color:'#d1d5db'
                }
            }
        },

        yAxis:{
            type:'value',
            name:'服务数量',
            min:0,
            max:200,
            interval:50,
            nameTextStyle:{
                color:'#000',
                padding:[0,0,8,-28]
            },
            axisLabel:{
                color:'#000'
            },
            splitLine:{
                lineStyle:{
                    color:'#f3f4f6'
                }
            }
        },

        series:[
            {
                name:'服务数量',
                type:'bar',
                barWidth:'42%',
                data:industryData,

                itemStyle:{
                    color:'#3b82f6',
                    borderRadius:[4,4,0,0]
                },

                label:{
                    show:true,
                    position:'top',
                    color:'#374151'
                }
            }
        ]
    });

    window.addEventListener('resize',()=>{
        chart.resize();
    });

});

</script>

</body>
</html>
