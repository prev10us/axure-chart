<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据传输分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 防止出现滚动条 */
            background-color: transparent; /* 背景透明，更好融入 Axure */
        }
        #chart-container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="chart-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 横坐标设置为1月至7月
            const dates = ['1月', '2月', '3月', '4月', '5月', '6月', '7月'];

            // 生成0-200之间的平滑波动数据
            const transmissionData = [45, 82, 65, 120, 95, 150, 185];
            
            const textStyle = { color: '#000000' };

            const chart = echarts.init(document.getElementById('chart-container'));
            chart.setOption({
                tooltip: { trigger: 'axis' },
                grid: { left: '2%', right: '4%', bottom: '5%', top: '15%', containLabel: true },
                xAxis: { 
                    type: 'category', 
                    boundaryGap: false, 
                    data: dates,
                    axisLabel: textStyle
                },
                yAxis: { 
                    type: 'value', 
                    name: '数量 (条)',
                    min: 0,
                    max: 200,
                    nameTextStyle: textStyle,
                    axisLabel: textStyle,
                    splitLine: { lineStyle: { color: '#f3f4f6' } }
                },
                series: [{
                    name: '传输量', 
                    type: 'line', 
                    smooth: 0.5, // 调整为 0.5 增加曲线的平滑程度
                    symbol: 'circle',
                    itemStyle: { color: '#3b82f6' },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(59, 130, 246, 0.6)' },
                            { offset: 1, color: 'rgba(255, 255, 255, 0.1)' }
                        ])
                    },
                    data: transmissionData
                }]
            });

            window.addEventListener('resize', function() {
                chart.resize();
            });
        });
    </script>
</body>
</html>
