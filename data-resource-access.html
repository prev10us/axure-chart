<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<script src='https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js'></script>
<style>html,body,#c{height:100%;margin:0;background:#fff;font-family:Arial,"Microsoft YaHei";}</style></head>
<body><div id='c'></div><script>
var c=echarts.init(document.getElementById('c'));
c.setOption({
title:{text:'数据资源访问趋势',left:20,top:16,textStyle:{fontSize:18,fontWeight:'bold'},subtext:'近12个月资源访问量'},
tooltip:{trigger:'axis'},
grid:{left:60,right:30,top:70,bottom:45},
xAxis:{type:'category',boundaryGap:false,data:['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],axisLine:{lineStyle:{color:'#d8dee9'}}},
yAxis:{type:'value',splitLine:{lineStyle:{color:'#edf2f7'}}},
series:[{type:'line',smooth:true,symbol:'circle',symbolSize:8,
data:[120,138,156,181,205,236,265,298,342,386,431,488],
lineStyle:{width:3,color:'#3b82f6'},itemStyle:{color:'#3b82f6'},
areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(59,130,246,.45)'},{offset:1,color:'rgba(59,130,246,.05)'}])}}]});
window.onresize=()=>c.resize();
</script></body></html>
