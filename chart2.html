<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务调用分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent;
        }
        #chart-container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="chart-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 横坐标设置为1月至7月
            const dates = ['1月', '2月', '3月', '4月', '5月', '6月', '7月'];

            // 数据点精密分布在 50 至 100 之间
            const callsData = [65, 82, 58, 91, 73, 88, 62];
            
            const textStyle = { color: '#000000' };

            const chart = echarts.init(document.getElementById('chart-container'));
            chart.setOption({
                // 左上角保留“服务调用时间轴”字样
                title: {
                    text: '服务调用时间轴',
                    textStyle: {
                        color: '#000000',
                        fontSize: 16,
                        fontWeight: 'bold'
                    },
                    left: '2%',
                    top: '2%'
                },
                tooltip: { trigger: 'axis' },
                // 适当调整 grid.top 以确保纵坐标名称不会与主标题重叠
                grid: { left: '2%', right: '4%', bottom: '5%', top: '25%', containLabel: true },
                xAxis: { 
                    type: 'category', 
                    boundaryGap: false, 
                    data: dates,
                    axisLabel: textStyle
                },
                yAxis: { 
                    type: 'value', 
                    name: '数量/个',
                    min: 0,
                    max: 200,
                    interval: 50, // 设定间距为50
                    nameTextStyle: {
                        color: '#000000',
                        align: 'left',        // 设置左对齐
                        padding: [0, 0, 8, -28] // 微调上边距与左边距，使其与纵轴数字完美对齐
                    },
                    axisLabel: textStyle,
                    splitLine: { lineStyle: { color: '#f3f4f6' } }
                },
                series: [{
                    name: '调用次数', 
                    type: 'line', 
                    smooth: 0.5, // 开启高度平滑
                    symbol: 'circle',
                    itemStyle: { color: '#3b82f6' },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(59, 130, 246, 0.6)' },
                            { offset: 1, color: 'rgba(255, 255, 255, 0.1)' }
                        ])
                    },
                    data: callsData
                }]
            });

            window.addEventListener('resize', function() {
                chart.resize();
            });
        });
    </script>
</body>
</html>
